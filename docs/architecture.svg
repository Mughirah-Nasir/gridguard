<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a8aa0"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="920" height="560" fill="#0a0e14"/>
  <text x="32" y="44" fill="#38bdf8" font-size="22" font-weight="bold" letter-spacing="3">GRID<tspan fill="#e2e8f0">GUARD</tspan></text>
  <text x="32" y="66" fill="#6b7c93" font-size="12">architecture — gridguard run -- &lt;command&gt;</text>

  <!-- CLI entry -->
  <rect x="32" y="92" width="230" height="58" rx="8" fill="#111722" stroke="#243044"/>
  <text x="147" y="116" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">cli.py</text>
  <text x="147" y="136" fill="#6b7c93" font-size="11" text-anchor="middle">parses `-- command` split</text>

  <!-- Duration oracle -->
  <rect x="32" y="196" width="230" height="92" rx="8" fill="#111722" stroke="#38bdf8"/>
  <text x="147" y="220" fill="#38bdf8" font-size="13" text-anchor="middle" font-weight="bold">Duration Oracle</text>
  <text x="147" y="240" fill="#c8d3e0" font-size="11" text-anchor="middle">signature("docker build")</text>
  <text x="147" y="257" fill="#c8d3e0" font-size="11" text-anchor="middle">p90 of past runs × 1.25</text>
  <text x="147" y="274" fill="#6b7c93" font-size="10" text-anchor="middle">history → config → fallback</text>

  <!-- SQLite -->
  <rect x="32" y="330" width="230" height="56" rx="8" fill="#0d131d" stroke="#243044" stroke-dasharray="4 3"/>
  <text x="147" y="354" fill="#c8d3e0" font-size="12" text-anchor="middle">SQLite history</text>
  <text x="147" y="372" fill="#6b7c93" font-size="10" text-anchor="middle">successful runs only</text>

  <!-- Grid oracle -->
  <rect x="345" y="196" width="230" height="92" rx="8" fill="#111722" stroke="#fbbf24"/>
  <text x="460" y="220" fill="#fbbf24" font-size="13" text-anchor="middle" font-weight="bold">Grid Oracle</text>
  <text x="460" y="240" fill="#c8d3e0" font-size="11" text-anchor="middle">expand → merge windows</text>
  <text x="460" y="257" fill="#c8d3e0" font-size="11" text-anchor="middle">runway = next cut − now</text>
  <text x="460" y="274" fill="#6b7c93" font-size="10" text-anchor="middle">half-open [start, end)</text>

  <!-- schedule file -->
  <rect x="345" y="330" width="230" height="56" rx="8" fill="#0d131d" stroke="#243044" stroke-dasharray="4 3"/>
  <text x="460" y="354" fill="#c8d3e0" font-size="12" text-anchor="middle">schedule.json / .csv</text>
  <text x="460" y="372" fill="#6b7c93" font-size="10" text-anchor="middle">IESCO/LESCO/K-E rota</text>

  <!-- plan_guard -->
  <rect x="658" y="180" width="230" height="124" rx="8" fill="#161d2b" stroke="#38bdf8" stroke-width="2"/>
  <text x="773" y="206" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="bold">plan_guard()</text>
  <text x="773" y="224" fill="#6b7c93" font-size="10" text-anchor="middle">pure · deterministic · no I/O</text>
  <text x="773" y="248" fill="#c8d3e0" font-size="11" text-anchor="middle">needed ≤ runway ?</text>
  <text x="773" y="270" fill="#34d399" font-size="11" text-anchor="middle">go</text>
  <text x="773" y="288" fill="#f87171" font-size="11" text-anchor="middle">blocked-runway / power-off</text>

  <!-- outcomes -->
  <rect x="658" y="356" width="230" height="64" rx="8" fill="#0f1a14" stroke="#34d399"/>
  <text x="773" y="382" fill="#34d399" font-size="12" text-anchor="middle" font-weight="bold">run · time · record</text>
  <text x="773" y="402" fill="#6b7c93" font-size="10" text-anchor="middle">history gets smarter</text>

  <rect x="658" y="452" width="230" height="64" rx="8" fill="#1a0f10" stroke="#f87171"/>
  <text x="773" y="478" fill="#f87171" font-size="12" text-anchor="middle" font-weight="bold">exit 87 (never ran)</text>
  <text x="773" y="498" fill="#6b7c93" font-size="10" text-anchor="middle">--wait → sleep until safe_start</text>

  <!-- dashboard -->
  <rect x="345" y="452" width="230" height="64" rx="8" fill="#111722" stroke="#243044"/>
  <text x="460" y="478" fill="#c8d3e0" font-size="12" text-anchor="middle" font-weight="bold">FastAPI dashboard</text>
  <text x="460" y="498" fill="#6b7c93" font-size="10" text-anchor="middle">/api/status · /schedule · /history</text>

  <!-- edges -->
  <line x1="147" y1="150" x2="147" y2="192" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="147" y1="288" x2="147" y2="326" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="288" x2="460" y2="326" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="262" y1="242" x2="341" y2="242" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="575" y1="242" x2="654" y2="242" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="773" y1="304" x2="773" y2="352" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="788" y="334" fill="#34d399" font-size="10">go</text>
  <path d="M 888 304 q 24 90 -2 148" fill="none" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="872" y="380" fill="#f87171" font-size="10">blocked</text>
  <path d="M 658 388 q -180 -10 -490 -26" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
  <text x="380" y="406" fill="#34d399" font-size="9">feedback: duration recorded</text>
  <line x1="460" y1="386" x2="460" y2="448" stroke="#7a8aa0" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
